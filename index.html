<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅行酒窩</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #3d6b4f;
    --green-mid: #5a8c6a;
    --green-light: #e2ede4;
    --green-pale: #f0f5f0;
    --cream: #f7f4ef;
    --card-bg: #ffffff;
    --text-primary: #2c3e2d;
    --text-secondary: #6b7c6d;
    --text-muted: #9aab9c;
    --border: #e0e8e1;
    --dot-red: #e05c5c;
    --dot-orange: #e09040;
    --dot-blue: #4a7fc1;
    --dot-purple: #8b6bb1;
    --dot-green: #4a9a6a;
    --shadow: 0 2px 12px rgba(61,107,79,0.10);
    --shadow-card: 0 1px 6px rgba(61,107,79,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif;
    background: #dde8de;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--cream);
    padding: 50px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .back-btn {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 6px;
    flex-shrink: 0;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    flex: 1;
    padding-right: 8px;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .header-title.edit-mode {
    background: #fff;
    border: 1.5px solid var(--green-mid);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 16px;
    outline: none;
    width: 100%;
  }
  .header-icons {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-shrink: 0;
  }
  .header-icons svg {
    width: 22px;
    height: 22px;
    color: var(--text-secondary);
  }
  .header-date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 36px;
  }
  .header-date {
    font-size: 13px;
    color: var(--text-secondary);
    background: #fff9c4;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 500;
  }
  .header-date.edit-mode {
    background: #fff;
    border: 1.5px solid var(--green-mid);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 13px;
    outline: none;
  }
  .sync-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--green-mid);
    font-weight: 500;
  }
  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-mid);
  }

  /* ── Weather Card ── */
  .weather-card {
    margin: 14px 14px 0;
    background: var(--green-light);
    border-radius: 18px;
    padding: 14px 16px;
    border: 1px solid #c4d9c8;
    box-shadow: var(--shadow-card);
  }
  .weather-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .weather-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .weather-icon { font-size: 36px; line-height: 1; }
  .weather-day {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.2px;
  }
  .weather-date {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  .weather-right { text-align: right; }
  .weather-desc {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .weather-temp {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 2px;
  }
  .weather-bottom {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .weather-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .weather-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .w-edit {
    background: none;
    border: 1.5px solid var(--green-mid);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 12px;
    font-family: inherit;
    color: var(--green-dark);
    outline: none;
    width: 100%;
  }

  /* ── Day Tabs ── */
  .day-tabs-wrap {
    padding: 12px 14px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-tabs-wrap::-webkit-scrollbar { display: none; }
  .day-tabs { display: flex; gap: 8px; min-width: max-content; }
  .day-tab {
    padding: 7px 14px;
    border-radius: 22px;
    font-size: 13px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    white-space: nowrap;
    transition: all 0.15s;
    text-align: center;
    box-shadow: var(--shadow-card);
  }
  .day-tab .tab-label { font-weight: 700; letter-spacing: 0.2px; }
  .day-tab .tab-date { font-size: 12px; opacity: 0.8; margin-top: 1px; }
  .day-tab.active {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: white;
    box-shadow: 0 3px 10px rgba(61,107,79,0.30);
  }
  .add-day-tab {
    padding: 7px 16px;
    border-radius: 22px;
    font-size: 20px;
    cursor: pointer;
    border: 2px dashed var(--green-mid);
    background: none;
    color: var(--green-mid);
    display: none;
    line-height: 1;
    align-items: center;
  }

  /* ── Lock Bar ── */
  .lock-bar {
    margin: 12px 14px 0;
    background: #f0f4f0;
    border-radius: 12px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
  }
  .lock-left {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .lock-left svg { width: 15px; height: 15px; }
  .unlock-btn {
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    box-shadow: 0 2px 8px rgba(61,107,79,0.25);
  }
  .unlock-btn.active { background: #c0392b; box-shadow: 0 2px 8px rgba(192,57,43,0.25); }
  .save-hint { font-size: 12px; color: var(--green-mid); display: none; font-weight: 500; }

  /* ── Timeline ── */
  .timeline {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px 110px;
    scrollbar-width: none;
  }
  .timeline::-webkit-scrollbar { display: none; }
  .tl-row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 4px;
    position: relative;
  }
  .tl-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 56px;
    flex-shrink: 0;
    padding-top: 16px;
  }
  .tl-time {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .tl-dot-outer {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 2.5px solid white;
    margin-top: 16px;
    flex-shrink: 0;
    z-index: 1;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .tl-vline {
    width: 2px;
    background: var(--border);
    flex: 1;
    min-height: 20px;
  }
  .tl-card {
    flex: 1;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 11px 14px;
    margin: 6px 0 6px 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow-card);
  }
  .tl-card:active { background: var(--green-pale); }
  .tl-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tl-card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    flex: 1;
    letter-spacing: 0.2px;
  }
  .tl-chevron {
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .tl-chevron.open { transform: rotate(180deg); }
  .tl-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .tl-detail.show { display: block; }
  .tl-detail-note {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .map-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--green-pale);
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .map-btn-left { display: flex; align-items: center; gap: 7px; }
  .map-btn-left svg { width: 15px; height: 15px; color: #e05c5c; }
  .map-btn-text { font-size: 12px; color: var(--text-secondary); }
  .map-btn-name { font-size: 13px; color: var(--text-primary); font-weight: 700; }
  .map-open {
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Edit styles ── */
  .edit-field {
    border: 1.5px solid var(--green-mid);
    border-radius: 8px;
    padding: 5px 9px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    outline: none;
    color: var(--text-primary);
    width: 100%;
  }
  .edit-field-time {
    width: 54px;
    font-size: 13px;
    text-align: center;
    border: 1.5px solid var(--green-mid);
    border-radius: 7px;
    padding: 3px 4px;
    font-family: inherit;
    background: #fff;
    outline: none;
    color: var(--text-secondary);
    font-weight: 700;
  }
  .edit-actions { display: flex; gap: 6px; margin-top: 9px; }
  .btn-del {
    background: #fde8e8;
    color: #c0392b;
    border: none;
    border-radius: 7px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-add {
    width: 100%;
    margin: 6px 0 6px 10px;
    background: none;
    border: 2px dashed var(--green-mid);
    border-radius: 14px;
    padding: 11px;
    font-size: 14px;
    color: var(--green-mid);
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .btn-add:active { background: var(--green-pale); }

  /* ── Day edit bar ── */
  .day-edit-bar {
    margin: 10px 14px 0;
    display: none;
    background: #fff;
    border-radius: 12px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    gap: 8px;
  }
  .day-edit-bar.show { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
  .day-edit-bar label { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
  .day-del-btn {
    background: #fde8e8;
    color: #c0392b;
    border: none;
    border-radius: 7px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    margin-left: auto;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: sticky;
    bottom: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 22px;
    z-index: 10;
    box-shadow: 0 -2px 16px rgba(61,107,79,0.10);
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 4px 18px;
    border-radius: 12px;
  }
  .nav-item svg { width: 24px; height: 24px; color: var(--text-muted); }
  .nav-item.active svg { color: var(--green-dark); }
  .nav-item span { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .nav-item.active span { color: var(--green-dark); font-weight: 700; }

  /* ── FAB ── */
  .fab {
    position: absolute;
    bottom: 85px;
    right: 18px;
    background: var(--green-dark);
    color: white;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    font-size: 26px;
    z-index: 9;
    box-shadow: 0 4px 14px rgba(61,107,79,0.35);
  }
  .fab.show { display: flex; }

  /* ── Dot colors ── */
  .dot-red { background: var(--dot-red); }
  .dot-orange { background: var(--dot-orange); }
  .dot-blue { background: var(--dot-blue); }
  .dot-purple { background: var(--dot-purple); }
  .dot-green { background: var(--dot-green); }
  .dot-colors { display: flex; gap: 6px; margin-top: 7px; }
  .dot-pick {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .dot-pick.selected { border-color: #333; }
</style>
</head>
<body>
<div class="phone" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div style="flex:1;padding-right:8px;">
        <div id="tripTitleDisplay" class="header-title" onclick="editTripTitle()">載入中...</div>
        <input id="tripTitleInput" class="header-title edit-mode" style="display:none;" onblur="saveTripTitle()" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <div class="header-icons">
        <div class="sync-badge"><div class="sync-dot"></div><span id="syncStatus">已同步</span></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
    <div class="header-date-row">
      <span id="tripDateDisplay" class="header-date" onclick="editTripDate()">...</span>
      <input id="tripDateInput" class="header-date edit-mode" style="display:none;" onblur="saveTripDate()" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
  </div>

  <!-- Weather Card -->
  <div class="weather-card" id="weatherCard"></div>

  <!-- Day Tabs -->
  <div class="day-tabs-wrap">
    <div class="day-tabs" id="dayTabs"></div>
  </div>

  <!-- Day Edit Bar -->
  <div class="day-edit-bar" id="dayEditBar"></div>

  <!-- Lock Bar -->
  <div class="lock-bar">
    <div class="lock-left">
      <svg id="lockIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span id="lockText">目前為瀏覽模式</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="save-hint" id="saveHint">✓ 已儲存</span>
      <button class="unlock-btn" id="unlockBtn" onclick="toggleEditMode()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        解鎖編輯
      </button>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="addItem()">+</button>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>行程</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>地圖</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>備忘</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>成員</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>預算</span>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz9xWsHCmg5h09CL2t-Bs9HFn6cSREggFYe9GY82bv7IDjLyqBHkjaau5neGJo5DX20IA/exec";

const DOT_COLORS = ['dot-blue','dot-orange','dot-red','dot-purple','dot-green'];

// ── 城市名稱對照表 (中文/日文 → 英文，確保 geocoding 成功) ──

  '名古屋':'Nagoya',

  '長崎':'Nagasaki',
  '熊本':'Kumamoto',

// ── 雲端載入 ──
async function load() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    if (text && text !== "{}") {
      data = JSON.parse(text);
      localStorage.setItem('travelData', JSON.stringify(data));
      document.getElementById('syncStatus').textContent = "已同步";
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      document.getElementById('syncStatus').textContent = "初次載入";
    }
  } catch (e) {
    const saved = localStorage.getItem('travelData');
    data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    document.getElementById('syncStatus').textContent = "離線";
    document.querySelector('.sync-dot').style.background = '#c0392b';
  }
  renderHeader();
  switchDay(0);
}

// ── 雲端寫入 ──
function save() {
  localStorage.setItem('travelData', JSON.stringify(data));
  const hint = document.getElementById('saveHint');
  hint.textContent = '⏳ 同步中...';
  hint.style.color = 'var(--dot-orange)';
  hint.style.display = 'inline';
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ password: sessionPassword, data: data })
      });
      const result = await res.json();
      if (result.status === 'success') {
        hint.textContent = '✓ 已儲存雲端';
        hint.style.color = 'var(--green-mid)';
      } else {
        hint.textContent = '❌ ' + result.message;
        hint.style.color = '#c0392b';
        if (editMode) toggleEditMode();
      }
    } catch(e) {
      hint.textContent = '❌ 連線失敗(存於本機)';
      hint.style.color = '#c0392b';
    }
    setTimeout(() => { if (!editMode) hint.style.display = 'none'; }, 3000);
  }, 1500);
}

// ── 自動抓取天氣（支援台日城市） ──
async function autoFetchWeather(dayIndex) {
  const rawCity = data.days[dayIndex].city;
  if (!rawCity || rawCity === '城市') return alert('請先輸入正確的城市名稱！');

  const city = resolveCity(rawCity);

  const hint = document.getElementById('saveHint');
  hint.textContent = '🔄 抓取天氣中...';
  hint.style.color = 'var(--dot-blue)';
  hint.style.display = 'inline';

  try {
    // Step 1: Geocoding — 同時嘗試語言 en 以提高命中率
    const geoRes = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=5&language=en`
    );
    const geoData = await geoRes.json();

    if (!geoData.results || geoData.results.length === 0) {
      alert(`找不到「${rawCity}」(${city}) 的氣象資料。\n請嘗試輸入英文城市名，如：Hiroshima、Kaohsiung`);
      hint.style.display = 'none';
      return;
    }

    // 優先選台灣或日本的結果
    let loc = geoData.results.find(r => r.country_code === 'TW' || r.country_code === 'JP')
           || geoData.results[0];

    const { latitude: lat, longitude: lon, timezone } = loc;
    const tz = timezone || 'Asia/Tokyo';

    // Step 2: 天氣預報
    const weatherRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=${tz}&forecast_days=16`
    );
    const wData = await weatherRes.json();

    // Step 3: 找對應日期
    const dateStr = data.days[dayIndex].date; // e.g. "4/24"
    const parts = dateStr.split('/');
    const mm = (parts[0] || '').padStart(2, '0');
    const dd = (parts[1] || '').padStart(2, '0');
    const searchSuffix = `-${mm}-${dd}`;
    let targetIdx = wData.daily.time.findIndex(t => t.endsWith(searchSuffix));

    if (targetIdx === -1) {
      targetIdx = 0;
      alert(`日期不在 16 天預報範圍內，先填入近期概況，建議出發前一週再更新！`);
    }

    // Step 4: 天氣代碼 → Emoji
    const wCode = wData.daily.weathercode[targetIdx];
    let icon = '⛅', desc = '多雲';
    if (wCode === 0)                          { icon = '☀️'; desc = '晴朗'; }
    else if (wCode >= 1 && wCode <= 3)        { icon = '⛅'; desc = '晴時多雲'; }
    else if (wCode === 45 || wCode === 48)    { icon = '🌫️'; desc = '起霧'; }
    else if (wCode >= 51 && wCode <= 55)      { icon = '🌦️'; desc = '毛毛雨'; }
    else if (wCode >= 61 && wCode <= 67)      { icon = '🌧️'; desc = '雨天'; }
    else if (wCode >= 71 && wCode <= 77)      { icon = '❄️'; desc = '下雪'; }
    else if (wCode >= 80 && wCode <= 82)      { icon = '🌦️'; desc = '陣雨'; }
    else if (wCode >= 95)                     { icon = '⛈️'; desc = '雷陣雨'; }

    // Step 5: 更新
    const wObj = data.days[dayIndex].weather;
    wObj.icon = icon;
    wObj.desc = desc;
    wObj.high = Math.round(wData.daily.temperature_2m_max[targetIdx]);
    wObj.low  = Math.round(wData.daily.temperature_2m_min[targetIdx]);
    wObj.rain = wData.daily.precipitation_probability_max[targetIdx] || 0;
    wObj.wind = Math.round(wData.daily.windspeed_10m_max[targetIdx]) + ' km/h';

    if (wObj.high >= 28)      wObj.outfit = '短袖＋防曬';
    else if (wObj.high >= 22) wObj.outfit = '薄長袖＋輕薄外套';
    else if (wObj.high >= 15) wObj.outfit = '長袖＋防風外套';
    else                       wObj.outfit = '發熱衣＋保暖羽絨';

    save();
    buildWeather(data.days[dayIndex]);

    hint.textContent = '✓ 天氣已更新';
    hint.style.color = 'var(--green-mid)';
    setTimeout(() => {
      if (editMode) { hint.textContent = '🖊️ 編輯中'; hint.style.color = 'var(--text-secondary)'; }
      else { hint.style.display = 'none'; }
    }, 2000);

  } catch(e) {
    console.error(e);
    alert('連線氣象站失敗，請確認網路狀態。');
    hint.style.display = 'none';
  }
}

function toggleEditMode() {
  const hint = document.getElementById('saveHint');
  if (!editMode) {
    if (!sessionPassword) {
      const pwd = prompt("請輸入編輯密碼：");
      if (!pwd) return;
      sessionPassword = pwd;
    }
    editMode = true;
  } else {
    editMode = false;
    hint.style.display = 'none';
  }
  const btn = document.getElementById('unlockBtn');
  const txt = document.getElementById('lockText');
  const icon = document.getElementById('lockIcon');
  const fab = document.getElementById('fab');
  const addDayTab = document.getElementById('addDayTab');
  const dayEditBar = document.getElementById('dayEditBar');
  if (editMode) {
    btn.classList.add('active'); btn.textContent = '🔒 鎖定';
    txt.textContent = '編輯模式 — 點擊可修改';
    icon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
    fab.classList.add('show');
    if (addDayTab) addDayTab.style.display = 'flex';
    dayEditBar.classList.add('show');
    hint.textContent = '🖊️ 編輯中';
    hint.style.color = 'var(--text-secondary)';
    hint.style.display = 'inline';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 解鎖編輯';
    txt.textContent = '目前為瀏覽模式';
    fab.classList.remove('show');
    if (addDayTab) addDayTab.style.display = 'none';
    dayEditBar.classList.remove('show');
  }
  renderHeader();
  buildTimeline(data.days[currentDay]);
  buildDayEditBar();
}

function updateWeather(di, key, val) { data.days[di].weather[key] = val; save(); }
function updateDayCity(di, val) { data.days[di].city = val; buildTabs(); save(); }
function updateDayDate(di, val) { data.days[di].date = val; buildTabs(); save(); }
function parseTemp(di, val) {
  const m = val.match(/(\d+)/g);
  if (m && m.length >= 2) { data.days[di].weather.high = parseInt(m[0]); data.days[di].weather.low = parseInt(m[1]); }
  save();
}

function buildTabs() {
  const c = document.getElementById('dayTabs');
  c.innerHTML = data.days.map((d,i) => `
    <div class="day-tab ${i===currentDay?'active':''}" onclick="switchDay(${i})">
      <div class="tab-label">Day ${d.day}</div>
      <div class="tab-date">${d.date}</div>
    </div>`).join('') +
    `<div class="add-day-tab" id="addDayTab" onclick="addDay()" style="display:${editMode?'flex':'none'};align-items:center;">+</div>`;
}

function buildDayEditBar() {
  const bar = document.getElementById('dayEditBar');
  if (!editMode) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  const d = data.days[currentDay];
  bar.innerHTML = `
    <label>日期</label>
    <input class="edit-field" style="width:65px;" value="${d.date}" onchange="updateDayDate(${currentDay},this.value)">
    <label>城市</label>

    <button class="unlock-btn" style="background:var(--dot-blue);" onclick="autoFetchWeather(${currentDay})">🔄 更新天氣</button>
    <button class="day-del-btn" onclick="deleteDay(${currentDay})">刪除此天</button>`;
}

            <textarea class="edit-field" rows="2" onclick="event.stopPropagation()" onchange="updateItem(${idx},'note',this.value)" style="resize:none;margin-bottom:8px;">${item.note||''}</textarea>
            <input class="edit-field" placeholder="地圖搜尋名稱" value="${item.map||''}" onclick="event.stopPropagation()" onchange="updateItem(${idx},'map',this.value)" style="margin-bottom:8px;">
            <div class="dot-colors">
              ${DOT_COLORS.map(dc=>`<div class="dot-pick ${dc} ${item.dot===dc?'selected':''}" onclick="event.stopPropagation();updateItem(${idx},'dot','${dc}');buildTimeline(data.days[currentDay]);"></div>`).join('')}
              <span style="font-size:12px;color:var(--text-muted);margin-left:4px;">顏色</span>
            </div>
            <div class="edit-actions">
              <button class="btn-del" onclick="event.stopPropagation();deleteItem(${idx})">🗑 刪除</button>
              ${idx > 0 ? `<button class="btn-del" style="background:#e8f0e9;color:var(--green-dark);" onclick="event.stopPropagation();moveItem(${idx},-1)">↑ 上移</button>` : ''}
              ${idx < day.items.length-1 ? `<button class="btn-del" style="background:#e8f0e9;color:var(--green-dark);" onclick="event.stopPropagation();moveItem(${idx},1)">↓ 下移</button>` : ''}
            </div>
          ` : `
            ${item.note ? `<div class="tl-detail-note">${item.note}</div>` : ''}
            <div class="map-btn">
              <div class="map-btn-left">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <div><div class="map-btn-text">Google 地圖</div><div class="map-btn-name">${item.map||item.name}</div></div>
              </div>
              <button class="map-open" onclick="event.stopPropagation();window.open('https://maps.google.com/?q=${encodeURIComponent(item.map||item.name)}','_blank')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                開啟
              </button>
            </div>
          `}
        </div>
      </div>
    </div>
    ${editMode ? `<button class="btn-add" style="display:block;" onclick="addItemAt(${idx+1})">＋ 在此新增行程</button>` : ''}`).join('');
}

function toggleDetail(card, idx) {
  const detail = document.getElementById(`detail-${idx}`);
  const chevron = card.querySelector('.tl-chevron');
  const isOpen = detail.classList.contains('show');
  detail.classList.toggle('show', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}
function updateItem(idx, key, val) {
  data.days[currentDay].items[idx][key] = val;
  save();
}
function deleteItem(idx) {
  if (!confirm('確定刪除這個行程？')) return;
  data.days[currentDay].items.splice(idx, 1);
  save(); buildTimeline(data.days[currentDay]);
}
function moveItem(idx, dir) {
  const items = data.days[currentDay].items;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;
  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
  save(); buildTimeline(data.days[currentDay]);
}
function addItem() { addItemAt(data.days[currentDay].items.length); }
function addItemAt(idx) {
  data.days[currentDay].items.splice(idx, 0, { time:'00:00', name:'新行程', dot:'dot-blue', note:'', map:'' });
  save(); buildTimeline(data.days[currentDay]);
  setTimeout(() => {
    const rows = document.querySelectorAll('.tl-row');
    if (rows[idx]) rows[idx].scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
}
function addDay() {
  data.days.push({
    day: data.days.length+1,
    date: '新日期',
    city: '城市',
    weather: { icon:'☀️', desc:'晴朗', high:25, low:18, rain:10, wind:'-- km/h', outfit:'自行填寫' },
    items: []
  });
  save(); switchDay(data.days.length-1);
}
function deleteDay(idx) {
  if (data.days.length <= 1) { alert('至少要保留一天行程！'); return; }
  if (!confirm(`確定刪除 Day ${data.days[idx].day}？`)) return;
  data.days.splice(idx, 1);
  data.days.forEach((d,i) => d.day = i+1);
  currentDay = Math.min(currentDay, data.days.length-1);
  save(); switchDay(currentDay);
}
function switchDay(idx) {
  currentDay = idx;
  buildWeather(data.days[idx]);
  buildTabs();
  buildTimeline(data.days[idx]);
  buildDayEditBar();
  document.getElementById('timeline').scrollTop = 0;
}

load();
</script>
</body>
</html>
