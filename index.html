<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅行酒窩</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #3d6b4f;
    --green-mid: #5a8c6a;
    --green-light: #e8f0e9;
    --green-pale: #f2f6f2;
    --cream: #faf8f3;
    --card-bg: #ffffff;
    --text-primary: #2c3e2d;
    --text-secondary: #6b7c6d;
    --text-muted: #9aab9c;
    --border: #e0e8e1;
    --dot-red: #e05c5c;
    --dot-orange: #e09040;
    --dot-blue: #4a7fc1;
    --dot-purple: #8b6bb1;
    --dot-green: #4a9a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #e8ede8; display: flex; justify-content: center; min-height: 100vh; }
  .phone { width: 100%; max-width: 390px; min-height: 100vh; background: var(--cream); display: flex; flex-direction: column; position: relative; }

  /* Header */
  .header { background: var(--cream); padding: 48px 16px 12px; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
  .header-title { font-size: 17px; font-weight: 700; color: var(--text-primary); flex: 1; padding-right: 8px; cursor: pointer; }
  .header-title.edit-mode { background: #fff; border: 1.5px solid var(--green-mid); border-radius: 8px; padding: 4px 8px; font-size: 15px; outline: none; width: 100%; }
  .header-icons { display: flex; gap: 14px; align-items: center; flex-shrink: 0; }
  .header-icons svg { width: 20px; height: 20px; color: var(--text-secondary); }
  .header-date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .header-date { font-size: 12px; color: var(--text-secondary); background: #fff9c4; display: inline-block; padding: 1px 7px; border-radius: 4px; cursor: pointer; }
  .header-date.edit-mode { background: #fff; border: 1.5px solid var(--green-mid); border-radius: 6px; padding: 2px 6px; font-size: 12px; outline: none; }
  .sync-badge { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--green-mid); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-mid); }

  /* Weather */
  .weather-card { margin: 12px 12px 0; background: var(--green-light); border-radius: 14px; padding: 12px 14px; border: 1px solid #c8dcc9; }
  .weather-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .weather-left { display: flex; align-items: center; gap: 10px; }
  .weather-icon { font-size: 26px; }
  .weather-day { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .weather-date { font-size: 11px; color: var(--text-secondary); }
  .weather-right { text-align: right; }
  .weather-desc { font-size: 12px; color: var(--text-secondary); }
  .weather-temp { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .weather-bottom { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .weather-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
  .weather-item svg { width: 13px; height: 13px; }
  .w-edit { background: none; border: 1.5px solid var(--green-mid); border-radius: 6px; padding: 1px 6px; font-size: 11px; font-family: inherit; color: var(--green-dark); outline: none; width: 100%; }

  /* Day Tabs */
  .day-tabs-wrap { padding: 10px 12px 0; overflow-x: auto; scrollbar-width: none; }
  .day-tabs-wrap::-webkit-scrollbar { display: none; }
  .day-tabs { display: flex; gap: 6px; min-width: max-content; }
  .day-tab { padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-secondary); white-space: nowrap; transition: all 0.15s; text-align: center; }
  .day-tab .tab-label { font-weight: 500; }
  .day-tab .tab-date { font-size: 11px; opacity: 0.8; }
  .day-tab.active { background: var(--green-dark); border-color: var(--green-dark); color: white; }
  .add-day-tab { padding: 6px 14px; border-radius: 20px; font-size: 18px; cursor: pointer; border: 1.5px dashed var(--green-mid); background: none; color: var(--green-mid); display: none; line-height: 1; }

  /* Lock Bar */
  .lock-bar { margin: 10px 12px 0; background: #f0f4f0; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
  .lock-left { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .lock-left svg { width: 14px; height: 14px; }
  .unlock-btn { background: var(--green-dark); color: white; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .unlock-btn.active { background: #c0392b; }
  .save-hint { font-size: 11px; color: var(--green-mid); display: none; transition: opacity 0.3s; }

  /* Timeline */
  .timeline { flex: 1; overflow-y: auto; padding: 10px 12px 100px; scrollbar-width: none; }
  .timeline::-webkit-scrollbar { display: none; }
  .tl-row { display: flex; align-items: flex-start; margin-bottom: 4px; position: relative; }
  .tl-left { display: flex; flex-direction: column; align-items: center; width: 54px; flex-shrink: 0; padding-top: 14px; }
  .tl-time { font-size: 12px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
  .tl-dot-outer { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; margin-top: 16px; flex-shrink: 0; z-index: 1; }
  .tl-vline { width: 2px; background: var(--border); flex: 1; min-height: 20px; }
  .tl-card { flex: 1; background: var(--card-bg); border-radius: 12px; padding: 10px 12px; margin: 6px 0 6px 8px; border: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .tl-card:active { background: var(--green-pale); }
  .tl-card-top { display: flex; align-items: center; justify-content: space-between; }
  .tl-card-name { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; }
  .tl-chevron { width: 16px; height: 16px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
  .tl-chevron.open { transform: rotate(180deg); }
  .tl-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .tl-detail.show { display: block; }
  .tl-detail-note { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
  .map-btn { display: flex; align-items: center; justify-content: space-between; background: var(--green-pale); border-radius: 8px; padding: 8px 10px; border: 1px solid var(--border); }
  .map-btn-left { display: flex; align-items: center; gap: 6px; }
  .map-btn-left svg { width: 14px; height: 14px; color: #e05c5c; }
  .map-btn-text { font-size: 12px; color: var(--text-secondary); }
  .map-btn-name { font-size: 12px; color: var(--text-primary); font-weight: 500; }
  .map-open { background: var(--green-dark); color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 3px; }

  /* Edit mode styles */
  .edit-field { border: 1.5px solid var(--green-mid); border-radius: 8px; padding: 4px 8px; font-size: 13px; font-family: inherit; background: #fff; outline: none; color: var(--text-primary); width: 100%; }
  .edit-field-time { width: 52px; font-size: 12px; text-align: center; border: 1.5px solid var(--green-mid); border-radius: 6px; padding: 3px 4px; font-family: inherit; background: #fff; outline: none; color: var(--text-secondary); }
  .edit-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-del { background: #fde8e8; color: #c0392b; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-family: inherit; cursor: pointer; }
  .btn-add { width: 100%; margin: 6px 0 6px 8px; background: none; border: 1.5px dashed var(--green-mid); border-radius: 12px; padding: 10px; font-size: 13px; color: var(--green-mid); font-family: inherit; cursor: pointer; display: none; }
  .btn-add:active { background: var(--green-pale); }

  /* Day edit controls */
  .day-edit-bar { margin: 8px 12px 0; display: none; background: #fff; border-radius: 10px; padding: 8px 12px; border: 1px solid var(--border); gap: 8px; }
  .day-edit-bar.show { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
  .day-edit-bar label { font-size: 11px; color: var(--text-secondary); }
  .day-del-btn { background: #fde8e8; color: #c0392b; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-family: inherit; cursor: pointer; margin-left: auto; }

  /* Bottom Nav */
  .bottom-nav { position: sticky; bottom: 0; background: var(--card-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 20px; z-index: 10; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 16px; border-radius: 10px; }
  .nav-item svg { width: 22px; height: 22px; color: var(--text-muted); }
  .nav-item.active svg { color: var(--green-dark); }
  .nav-item span { font-size: 10px; color: var(--text-muted); }
  .nav-item.active span { color: var(--green-dark); font-weight: 500; }

  /* FAB */
  .fab { position: absolute; bottom: 80px; right: 16px; background: var(--green-dark); color: white; width: 48px; height: 48px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 24px; z-index: 9; }
  .fab.show { display: flex; }

  .dot-red { background: var(--dot-red); }
  .dot-orange { background: var(--dot-orange); }
  .dot-blue { background: var(--dot-blue); }
  .dot-purple { background: var(--dot-purple); }
  .dot-green { background: var(--dot-green); }
  .dot-colors { display: flex; gap: 4px; margin-top: 6px; }
  .dot-pick { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .dot-pick.selected { border-color: #333; }
</style>
</head>
<body>
<div class="phone" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div style="flex:1;padding-right:8px;">
        <div id="tripTitleDisplay" class="header-title" onclick="editTripTitle()">載入中...</div>
        <input id="tripTitleInput" class="header-title edit-mode" style="display:none;" onblur="saveTripTitle()" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <div class="header-icons">
        <div class="sync-badge"><div class="sync-dot"></div><span id="syncStatus">同步中</span></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
    <div class="header-date-row">
      <span id="tripDateDisplay" class="header-date" onclick="editTripDate()">...</span>
      <input id="tripDateInput" class="header-date edit-mode" style="display:none;" onblur="saveTripDate()" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
  </div>

  <!-- Weather Card -->
  <div class="weather-card" id="weatherCard"></div>

  <!-- Day Tabs -->
  <div class="day-tabs-wrap">
    <div class="day-tabs" id="dayTabs"></div>
  </div>

  <!-- Day Edit Bar -->
  <div class="day-edit-bar" id="dayEditBar"></div>

  <!-- Lock Bar -->
  <div class="lock-bar">
    <div class="lock-left">
      <svg id="lockIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span id="lockText">目前為瀏覽模式</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="save-hint" id="saveHint">✓ 已儲存</span>
      <button class="unlock-btn" id="unlockBtn" onclick="toggleEditMode()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        解鎖編輯
      </button>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="addItem()">+</button>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>行程</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>地圖</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>備忘</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>成員</span>
    </div>
  </div>
</div>

<script>
// --- API 設定 ---
const API_URL = "https://script.google.com/macros/s/AKfycbz9xWsHCmg5h09CL2t-Bs9HFn6cSREggFYe9GY82bv7IDjLyqBHkjaau5neGJo5DX20IA/exec"; 

const DOT_COLORS = ['dot-blue','dot-orange','dot-red','dot-purple','dot-green'];
const DEFAULT_DATA = {
  title: '日本岡山廣島親子自駕行',
  dateRange: '2026/04/20 - 2026/04/27',
  days: [
    { day:1, date:'4/20', city:'岡山', weather:{icon:'⛅',desc:'晴時多雲',high:22,low:15,rain:20,wind:'18:35',outfit:'薄長袖＋輕薄外套'},
      items:[
        {time:'12:40',name:'高雄國際機場',dot:'dot-blue',note:'出發前請提早2小時抵達，確認行李是否超重',map:'高雄國際機場'},
        {time:'16:30',name:'抵達 岡山桃太郎機場',dot:'dot-orange',note:'入境後至租車櫃檯領取車輛，需出示國際駕照',map:'岡山桃太郎機場'},
        {time:'18:00',name:'VIA INN岡山 入住',dot:'dot-purple',note:'飯店提供免費停車，早餐另計',map:'VIA INN岡山'},
        {time:'18:30',name:'永旺夢樂城 AEON',dot:'dot-orange',note:'超市採買零食與日用品，B1有美食街',map:'永旺夢樂城岡山'},
        {time:'20:00',name:'鳥好站前本店（晚餐）',dot:'dot-red',note:'岡山知名雞肉料理，建議預約，人均約¥3,000',map:'鳥好站前本店岡山'},
      ]},
    { day:2, date:'4/21', city:'廣島', weather:{icon:'☀️',desc:'晴朗',high:23,low:16,rain:10,wind:'18:36',outfit:'短袖＋防曬外套'},
      items:[
        {time:'09:30',name:'岡山車站 出發',dot:'dot-blue',note:'搭新幹線至廣島，車程約30分鐘',map:'岡山車站'},
        {time:'10:30',name:'廣島車站 & Ekie商場',dot:'dot-orange',note:'車站內商場，可購買廣島特產',map:'廣島車站'},
        {time:'12:30',name:'Minamoa親水之城',dot:'dot-blue',note:'廣島最大商業設施，內有多間餐廳',map:'Minamoa廣島'},
        {time:'14:00',name:'熊野筆 SELECT SHOP',dot:'dot-green',note:'廣島特產熊野筆，適合購買伴手禮',map:'熊野筆廣島'},
        {time:'14:30',name:'舊日本銀行廣島支店',dot:'dot-purple',note:'免費參觀，保留原子彈爆炸痕跡的建築',map:'舊日本銀行廣島支店'},
        {time:'15:30',name:'廣島紙鶴塔',dot:'dot-red',note:'13F展望台/咖啡，12F互動區',map:'廣島紙鶴塔'},
        {time:'16:30',name:'廣島和平紀念資料館',dot:'dot-orange',note:'參觀約1.5小時，建議帶紙巾',map:'廣島和平紀念資料館'},
        {time:'18:00',name:'廣島原爆圓頂',dot:'dot-red',note:'免費參觀，約半小時',map:'原子彈爆炸圓頂屋'},
      ]},
  ]
};

let data, currentDay = 0, editMode = false;
let sessionPassword = ""; 
let saveTimeout; 

// --- 雲端載入邏輯 ---
async function load() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    // 檢查雲端資料庫是不是空的
    if (text && text !== "{}") {
      data = JSON.parse(text);
      localStorage.setItem('travelData', JSON.stringify(data)); 
      document.getElementById('syncStatus').textContent = "雲端已載入";
    } else {
      // 雲端如果沒有資料，載入預設資料並幫忙上傳一份
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      document.getElementById('syncStatus').textContent = "初次載入";
    }
  } catch (e) {
    console.error("雲端載入失敗，使用本地快取", e);
    const saved = localStorage.getItem('travelData');
    data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    document.getElementById('syncStatus').textContent = "離線模式";
    document.querySelector('.sync-dot').style.background = '#c0392b';
  }
  renderHeader();
  switchDay(0);
}

// --- 雲端寫入邏輯 ---
function save() {
  localStorage.setItem('travelData', JSON.stringify(data));
  const hint = document.getElementById('saveHint');
  hint.textContent = '⏳ 同步中...';
  hint.style.color = 'var(--dot-orange)';
  hint.style.display = 'inline';

  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ password: sessionPassword, data: data })
      });
      const result = await res.json();
      
      if (result.status === 'success') {
        hint.textContent = '✓ 已儲存雲端';
        hint.style.color = 'var(--green-mid)';
      } else {
        hint.textContent = '❌ ' + result.message;
        hint.style.color = '#c0392b';
        if(editMode) toggleEditMode(); 
      }
    } catch(e) {
      hint.textContent = '❌ 連線失敗(存於本機)';
      hint.style.color = '#c0392b';
    }
    setTimeout(() => { if(!editMode) hint.style.display = 'none'; }, 3000);
  }, 1500); 
}

// --- 自動抓取天氣 API 邏輯 ---
async function autoFetchWeather(dayIndex) {
  const city = data.days[dayIndex].city;
  if (!city || city === '城市') return alert('請先輸入正確的城市名稱！');

  const hint = document.getElementById('saveHint');
  hint.textContent = '🔄 抓取天氣中...';
  hint.style.color = 'var(--dot-blue)';
  hint.style.display = 'inline';

  try {
    // 1. 透過 Geocoding API 將城市名稱轉為經緯度
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`);
    const geoData = await geoRes.json();
    
    if (!geoData.results || geoData.results.length === 0) {
      alert(`找不到「${city}」的氣象資料，請嘗試輸入更準確的城市名（如：Tokyo, 高雄）。`);
      hint.style.display = 'none';
      return;
    }
    
    const { latitude: lat, longitude: lon, timezone } = geoData.results[0];
    const tz = timezone || 'Asia/Taipei';

    // 2. 透過 Open-Meteo 取得未來 14 天的預報資料
    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=${tz}&forecast_days=14`);
    const wData = await weatherRes.json();

    // 3. 尋找對應日期
    const dateParts = data.days[dayIndex].date.split('/');
    const month = dateParts[0].padStart(2, '0');
    const day = (dateParts[1] || '').padStart(2, '0');
    const searchDateStr = `${month}-${day}`; 

    let targetIdx = wData.daily.time.findIndex(t => t.endsWith(searchDateStr));

    if (targetIdx === -1) {
      targetIdx = 0; 
      alert(`出發日期不在未來 14 天預報範圍內。\n已先為您填入「${city}」近期的氣候概況，建議出發前一週再更新一次！`);
    }

    // 4. 解析天氣代碼並轉換成 Emoji
    const wCode = wData.daily.weathercode[targetIdx];
    let icon = '⛅', desc = '多雲';
    if (wCode === 0) { icon = '☀️'; desc = '晴朗'; }
    else if (wCode >= 1 && wCode <= 3) { icon = '⛅'; desc = '晴時多雲'; }
    else if (wCode === 45 || wCode === 48) { icon = '🌫️'; desc = '起霧'; }
    else if (wCode >= 51 && wCode <= 67) { icon = '🌧️'; desc = '雨天'; }
    else if (wCode >= 71 && wCode <= 77) { icon = '❄️'; desc = '下雪'; }
    else if (wCode >= 80 && wCode <= 82) { icon = '🌦️'; desc = '陣雨'; }
    else if (wCode >= 95) { icon = '⛈️'; desc = '雷陣雨'; }

    // 5. 更新行程表的天氣物件
    const wObj = data.days[dayIndex].weather;
    wObj.icon = icon;
    wObj.desc = desc;
    wObj.high = Math.round(wData.daily.temperature_2m_max[targetIdx]);
    wObj.low = Math.round(wData.daily.temperature_2m_min[targetIdx]);
    wObj.rain = wData.daily.precipitation_probability_max[targetIdx] || 0;
    wObj.wind = Math.round(wData.daily.windspeed_10m_max[targetIdx]) + ' km/h';

    // 產生穿搭建議
    if (wObj.high >= 28) wObj.outfit = '短袖＋防曬';
    else if (wObj.high >= 22) wObj.outfit = '薄長袖＋輕薄外套';
    else if (wObj.high >= 15) wObj.outfit = '長袖＋防風外套';
    else wObj.outfit = '發熱衣＋保暖羽絨';

    // 6. 存檔到試算表並重新渲染
    save();
    buildWeather(data.days[dayIndex]);
    
    hint.textContent = '✓ 天氣已更新';
    hint.style.color = 'var(--green-mid)';
    setTimeout(() => { 
      if(editMode) { 
        hint.textContent = '🖊️ 編輯中'; 
        hint.style.color = 'var(--text-secondary)'; 
      } else { 
        hint.style.display = 'none'; 
      } 
    }, 2000);

  } catch(e) {
    console.error(e);
    alert('連線氣象站失敗，請確認網路狀態。');
    hint.style.display = 'none';
  }
}

/* ── UI 與切換邏輯 ── */
function renderHeader() {
  document.getElementById('tripTitleDisplay').textContent = data.title;
  document.getElementById('tripDateDisplay').textContent = data.dateRange;
  if (editMode) {
    document.getElementById('tripTitleDisplay').style.cursor = 'text';
    document.getElementById('tripDateDisplay').style.cursor = 'text';
  } else {
    document.getElementById('tripTitleDisplay').style.cursor = 'default';
    document.getElementById('tripDateDisplay').style.cursor = 'default';
  }
}
function editTripTitle() {
  if (!editMode) return;
  const d = document.getElementById('tripTitleDisplay');
  const i = document.getElementById('tripTitleInput');
  i.value = data.title; d.style.display='none'; i.style.display='block'; i.focus();
}
function saveTripTitle() {
  const i = document.getElementById('tripTitleInput');
  data.title = i.value || data.title;
  document.getElementById('tripTitleDisplay').style.display='block'; i.style.display='none';
  renderHeader(); save();
}
function editTripDate() {
  if (!editMode) return;
  const d = document.getElementById('tripDateDisplay');
  const i = document.getElementById('tripDateInput');
  i.value = data.dateRange; d.style.display='none'; i.style.display='inline-block'; i.focus();
}
function saveTripDate() {
  const i = document.getElementById('tripDateInput');
  data.dateRange = i.value || data.dateRange;
  document.getElementById('tripDateDisplay').style.display='inline-block'; i.style.display='none';
  renderHeader(); save();
}

function toggleEditMode() {
  const hint = document.getElementById('saveHint');
  
  if (!editMode) {
    if (!sessionPassword) {
      const pwd = prompt("請輸入編輯密碼：\n(若未設定請輸入您在 Apps Script 中綁定的密碼)");
      if (!pwd) return; 
      sessionPassword = pwd;
    }
    editMode = true;
  } else {
    editMode = false;
    hint.style.display = 'none';
  }

  const btn = document.getElementById('unlockBtn');
  const txt = document.getElementById('lockText');
  const icon = document.getElementById('lockIcon');
  const fab = document.getElementById('fab');
  const addDayTab = document.getElementById('addDayTab');
  const dayEditBar = document.getElementById('dayEditBar');
  
  if (editMode) {
    btn.classList.add('active'); btn.textContent = '🔒 鎖定';
    txt.textContent = '編輯模式 — 點擊可修改';
    icon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
    fab.classList.add('show');
    if (addDayTab) addDayTab.style.display = 'flex';
    dayEditBar.classList.add('show');
    hint.textContent = '🖊️ 編輯中';
    hint.style.color = 'var(--text-secondary)';
    hint.style.display = 'inline';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 解鎖編輯';
    txt.textContent = '目前為瀏覽模式';
    fab.classList.remove('show');
    if (addDayTab) addDayTab.style.display = 'none';
    dayEditBar.classList.remove('show');
  }
  renderHeader();
  buildTimeline(data.days[currentDay]);
  buildDayEditBar();
}

function buildWeather(day) {
  const w = day.weather;
  document.getElementById('weatherCard').innerHTML = `
    <div class="weather-top">
      <div class="weather-left">
        <div class="weather-icon">${editMode ? `<input class="w-edit" style="width:50px;font-size:22px;" value="${w.icon}" onchange="updateWeather(${day.day-1},'icon',this.value)" onclick="event.stopPropagation()">` : w.icon}</div>
        <div>
          <div class="weather-day">Day ${day.day} — ${editMode ? `<input class="w-edit" style="width:70px;" value="${day.city}" onchange="updateDayCity(${day.day-1},this.value)">` : day.city}</div>
          <div class="weather-date">${editMode ? `<input class="w-edit" value="${day.date}" onchange="updateDayDate(${day.day-1},this.value)">` : day.date}</div>
        </div>
      </div>
      <div class="weather-right">
        <div class="weather-desc">${editMode ? `<input class="w-edit" style="width:80px;" value="${w.desc}" onchange="updateWeather(${day.day-1},'desc',this.value)">` : w.desc}</div>
        <div class="weather-temp">${editMode ? `<input class="w-edit" style="width:120px;" value="${w.high}° / ${w.low}°" onchange="parseTemp(${day.day-1},this.value)">` : `${w.high}° / ${w.low}°`}</div>
      </div>
    </div>
    <div class="weather-bottom">
      <div class="weather-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        ${editMode ? `<input class="w-edit" style="width:50px;" value="${w.wind}" onchange="updateWeather(${day.day-1},'wind',this.value)">` : w.wind}
      </div>
      <div class="weather-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="19" x2="8" y2="21"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="16" y1="19" x2="16" y2="21"/><line x1="16" y1="13" x2="16" y2="15"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="12" y1="15" x2="12" y2="17"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>
        ${editMode ? `<input class="w-edit" style="width:45px;" value="${w.rain}" onchange="updateWeather(${day.day-1},'rain',this.value)">` : w.rain}%
      </div>
      <div class="weather-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>
        ${editMode ? `<input class="w-edit" style="width:130px;" value="${w.outfit}" onchange="updateWeather(${day.day-1},'outfit',this.value)">` : w.outfit}
      </div>
    </div>`;
}
function updateWeather(di, key, val) { data.days[di].weather[key] = val; save(); }
function updateDayCity(di, val) { data.days[di].city = val; buildTabs(); save(); }
function updateDayDate(di, val) { data.days[di].date = val; buildTabs(); save(); }
function parseTemp(di, val) {
  const m = val.match(/(\d+)/g);
  if (m && m.length >= 2) { data.days[di].weather.high = parseInt(m[0]); data.days[di].weather.low = parseInt(m[1]); }
  save();
}

function buildTabs() {
  const c = document.getElementById('dayTabs');
  c.innerHTML = data.days.map((d,i) => `
    <div class="day-tab ${i===currentDay?'active':''}" onclick="switchDay(${i})">
      <div class="tab-label">Day ${d.day}</div>
      <div class="tab-date">${d.date}</div>
    </div>`).join('') + `<div class="add-day-tab" id="addDayTab" onclick="addDay()" style="display:${editMode?'flex':'none'};align-items:center;">+</div>`;
}

function buildDayEditBar() {
  const bar = document.getElementById('dayEditBar');
  if (!editMode) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  const d = data.days[currentDay];
  
  // 加上自動抓取天氣按鈕
  bar.innerHTML = `
    <label>日期</label>
    <input class="edit-field" style="width:65px;" value="${d.date}" onchange="updateDayDate(${currentDay},this.value)">
    <label>城市</label>
    <input class="edit-field" style="width:65px;" value="${d.city}" onchange="updateDayCity(${currentDay},this.value)">
    <button class="unlock-btn" style="background:var(--dot-blue);" onclick="autoFetchWeather(${currentDay})">🔄 更新天氣</button>
    <button class="day-del-btn" onclick="deleteDay(${currentDay})">刪除此天</button>`;
}

function buildTimeline(day) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = day.items.map((item, idx) => `
    <div class="tl-row" id="row-${idx}">
      <div class="tl-left" style="padding-top:14px;">
        ${editMode
          ? `<input class="edit-field-time" value="${item.time}" onchange="updateItem(${idx},'time',this.value)">`
          : `<div class="tl-time">${item.time}</div>`}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0;">
        <div class="tl-dot-outer ${item.dot}" style="margin-top:${editMode?'12':'16'}px;"></div>
        ${idx < day.items.length-1 ? '<div class="tl-vline" style="flex:1;min-height:30px;"></div>' : ''}
      </div>
      <div class="tl-card" onclick="toggleDetail(this,${idx})">
        <div class="tl-card-top">
          ${editMode
            ? `<input class="edit-field" value="${item.name}" onclick="event.stopPropagation()" onchange="updateItem(${idx},'name',this.value)" style="flex:1;margin-right:6px;">`
            : `<div class="tl-card-name">${item.name}</div>`}
          <svg class="tl-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="tl-detail" id="detail-${idx}">
          ${editMode ? `
            <textarea class="edit-field" rows="2" onclick="event.stopPropagation()" onchange="updateItem(${idx},'note',this.value)" style="resize:none;margin-bottom:8px;">${item.note||''}</textarea>
            <input class="edit-field" placeholder="地圖搜尋名稱" value="${item.map||''}" onclick="event.stopPropagation()" onchange="updateItem(${idx},'map',this.value)" style="margin-bottom:8px;">
            <div class="dot-colors">
              ${DOT_COLORS.map(dc=>`<div class="dot-pick ${dc} ${item.dot===dc?'selected':''}" onclick="event.stopPropagation();updateItem(${idx},'dot','${dc}');buildTimeline(data.days[currentDay]);"></div>`).join('')}
              <span style="font-size:11px;color:var(--text-muted);margin-left:4px;">顏色</span>
            </div>
            <div class="edit-actions">
              <button class="btn-del" onclick="event.stopPropagation();deleteItem(${idx})">🗑 刪除</button>
              ${idx > 0 ? `<button class="btn-del" style="background:#e8f0e9;color:var(--green-dark);" onclick="event.stopPropagation();moveItem(${idx},-1)">↑ 上移</button>` : ''}
              ${idx < day.items.length-1 ? `<button class="btn-del" style="background:#e8f0e9;color:var(--green-dark);" onclick="event.stopPropagation();moveItem(${idx},1)">↓ 下移</button>` : ''}
            </div>
          ` : `
            ${item.note ? `<div class="tl-detail-note">${item.note}</div>` : ''}
            <div class="map-btn">
              <div class="map-btn-left">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <div><div class="map-btn-text">Google 地圖</div><div class="map-btn-name">${item.map||item.name}</div></div>
              </div>
              <button class="map-open" onclick="event.stopPropagation();window.open('https://maps.google.com/?q=${encodeURIComponent(item.map||item.name)}','_blank')">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                開啟
              </button>
            </div>
          `}
        </div>
      </div>
    </div>
    ${editMode ? `<button class="btn-add" style="display:block;" onclick="addItemAt(${idx+1})">＋ 在此新增行程</button>` : ''}`).join('');
}

function toggleDetail(card, idx) {
  const detail = document.getElementById(`detail-${idx}`);
  const chevron = card.querySelector('.tl-chevron');
  const isOpen = detail.classList.contains('show');
  detail.classList.toggle('show', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

function updateItem(idx, key, val) {
  data.days[currentDay].items[idx][key] = val;
  save();
}
function deleteItem(idx) {
  if (!confirm('確定刪除這個行程？')) return;
  data.days[currentDay].items.splice(idx, 1);
  save(); buildTimeline(data.days[currentDay]);
}
function moveItem(idx, dir) {
  const items = data.days[currentDay].items;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;
  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
  save(); buildTimeline(data.days[currentDay]);
}
function addItem() { addItemAt(data.days[currentDay].items.length); }
function addItemAt(idx) {
  data.days[currentDay].items.splice(idx, 0, { time:'00:00', name:'新行程', dot:'dot-blue', note:'', map:'' });
  save(); buildTimeline(data.days[currentDay]);
  setTimeout(() => {
    const rows = document.querySelectorAll('.tl-row');
    if (rows[idx]) rows[idx].scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
}
function addDay() {
  const last = data.days[data.days.length-1];
  data.days.push({ day: data.days.length+1, date:'新日期', city:'城市', weather:{icon:'☀️',desc:'晴朗',high:25,low:18,rain:10,wind:'--',outfit:'自行填寫'}, items:[] });
  save(); switchDay(data.days.length-1);
}
function deleteDay(idx) {
  if (data.days.length <= 1) { alert('至少要保留一天行程！'); return; }
  if (!confirm(`確定刪除 Day ${data.days[idx].day}？`)) return;
  data.days.splice(idx, 1);
  data.days.forEach((d,i) => d.day = i+1);
  currentDay = Math.min(currentDay, data.days.length-1);
  save(); switchDay(currentDay);
}

function switchDay(idx) {
  currentDay = idx;
  buildWeather(data.days[idx]);
  buildTabs();
  buildTimeline(data.days[idx]);
  buildDayEditBar();
  document.getElementById('timeline').scrollTop = 0;
}

load();
</script>
